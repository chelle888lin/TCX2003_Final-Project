<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TCX2003 SQL Grading System</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      display:flex;
      background:#f4f6f9;
      min-height:100vh;
    }

    /* SIDEBAR */

    .sidebar{
      width:220px;
      background:#1f2937;
      color:white;

      position:fixed;
      top:0;
      left:0;

      height:100vh;

      padding:20px;

      overflow-y:auto;
    }

    .sidebar h2{
      text-align:center;
      margin-bottom:30px;
    }

    .sidebar ul{
      list-style:none;
    }

    .sidebar ul li{
      padding:15px;
      margin-bottom:10px;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    .sidebar ul li:hover{
      background:#374151;
    }

    /* MAIN CONTENT */

    .main{
      flex:1;
      margin-left:220px;
      padding:30px;
      width:100%;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
      flex-wrap:wrap;
      gap:10px;
    }

    /* CARDS */

    .card-container{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
    }

    .card h3{
      color:#555;
      margin-bottom:10px;
      font-size:16px;
    }

    .card p{
      font-size:28px;
      font-weight:bold;
      color:#111827;
    }

    /* SUBMISSION BOX */

    .submit-box{
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.1);
      margin-bottom:30px;
    }

    .submit-box h2{
      margin-bottom:15px;
    }

    textarea{
      width:100%;
      height:180px;
      padding:15px;
      border:1px solid #ccc;
      border-radius:8px;
      resize:none;
      margin-bottom:15px;
      font-size:14px;
    }

    button{
      background:#2563eb;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:8px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#1d4ed8;
    }

    /* TABLE */

    .table-container{
      overflow-x:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      border-radius:10px;
      overflow:hidden;
      min-width:600px;
    }

    table th,
    table td{
      padding:15px;
      border-bottom:1px solid #ddd;
      text-align:left;
    }

    table th{
      background:#2563eb;
      color:white;
    }

    tr:hover{
      background:#f9fafb;
    }

    /* RESPONSIVE */

    @media (max-width: 768px){

      body{
        flex-direction:column;
      }

      .sidebar{
        position:relative;
        width:100%;
        height:auto;
      }

      .main{
        margin-left:0;
        padding:20px;
      }

      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }

    }

  </style>

</head>

<body>

  <!-- SIDEBAR -->

  <div class="sidebar">
  <h2>TCX2003</h2>
  <ul>
    <a href="/home" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px;">
      <li>🏠 Home</li>
    </a>

    <a href="/submitSQL-student" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px;">
      <li>📤 Submit SQL</li>
    </a>

    <a href="/scores-student" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px;">
      <li>📊 Scores</li>
    </a>

    <a href="/leaderboard-student" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px;">
       <li>🏆 Leaderboard</li>
    </a>

    <a href="/change_password" style="text-decoration: none; color: inherit;">
      <li>🔒 Change Password</li>
    </a>
    
    <a href="/logout" style="text-decoration: none; color: inherit;">
      <li>🚪 Logout</li>
    </a>
  </ul>
</div>

  <!-- MAIN --> #idk how what layout to make

    <!-- TOPBAR -->

    <div class="topbar">
      <h1>📤 Submit SQL</h1>
    </div>

   </div>

</body>
</html>
