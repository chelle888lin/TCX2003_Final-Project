<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TCX2003 Password Change</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f4f6f9;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
    }

    h2 {
      text-align: center;
      margin-bottom: 8px;
    }

    p {
      text-align: center;
      margin-bottom: 25px;
      color: #666;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #2563eb;
    }

    .error {
      color: #dc2626;
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      margin-top: 10px;
      transition: 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      text-decoration: none;
      color: #2563eb;
      font-size: 14px;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="card">
    <h2>TCX2003 Portal</h2>
    <p>Update Security Credentials</p>

    <form id="passwordForm">
      
      <div class="form-group">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" required />
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" required />
        <div id="error" class="error">Passwords do not match</div>
      </div>

      <button type="submit" id="submitBtn">Update Password</button>
    </form>

    <a href="/home" class="back-link">Cancel and Return</a>
  </div>

  <script>
    const form = document.getElementById("passwordForm");
    const pw1 = document.getElementById("new_password");
    const pw2 = document.getElementById("confirm_password");
    const error = document.getElementById("error");
    const submitBtn = document.getElementById("submitBtn");

    function validate() {
      const p1 = pw1.value;
      const p2 = pw2.value;

      if (!p1 || !p2) {
        submitBtn.disabled = true;
        return;
      }

      if (p1 !== p2) {
        error.style.display = "block";
        submitBtn.disabled = true;
      } else {
        error.style.display = "none";
        submitBtn.disabled = false;
      }
    }

    pw1.addEventListener("input", validate);
    pw2.addEventListener("input", validate);

    form.addEventListener("submit", function (e) {
      e.preventDefault();

      const p1 = pw1.value;
      const p2 = pw2.value;

      if (p1 !== p2) {
        error.style.display = "block";
        return;
      }

      // 🔐 Replace this with backend API call later
      // Example:
      // fetch("/update-password", { method: "POST", body: JSON.stringify({ password: p1 }) })

      alert("Password updated successfully!");
      window.location.href = "/home";
    });
  </script>

</body>
</html>
